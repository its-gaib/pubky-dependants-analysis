name: Analyze Dependents

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run analysis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python analyze.py 2>&1 | tee analysis.log
      - name: Check for API cap
        run: |
          if grep -q 'hit the 1000-result API cap' analysis.log; then
            echo "ERROR: GitHub code search returned 1000 results (the API maximum)."
            echo "Some dependents are likely missing from the analysis."
            echo "Fix: split the gh search query in sources.py to stay under the cap."
            echo ""
            grep 'hit the 1000-result API cap' analysis.log
            exit 1
          fi
      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update dependents data"
          git pull --rebase
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
